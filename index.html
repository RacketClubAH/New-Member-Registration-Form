<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Aphrodite Hills Membership Registration 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --surface: #fbf9f5;
      --surface-2: #f1ece3;
      --border: rgba(78, 69, 58, 0.16);
      --text: #4a443d;
      --muted: #7b7369;
      --heading: #6a6358;
      --accent: #8a7e6d;
      --accent-dark: #655b4e;
      --radius-lg: 20px;
      --radius-full: 999px;
      --shadow: 0 18px 48px rgba(40, 30, 18, 0.08);
      --font-display: 'Cormorant Garamond', Georgia, serif;
      --font-body: 'Inter', Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(165, 149, 124, 0.12), transparent 28%),
        linear-gradient(180deg, #f7f4ee 0%, var(--bg) 100%);
      color: var(--text);
      font-family: var(--font-body);
      padding: 24px;
    }

    button { font: inherit; }

    /* ---------- Selection screen ---------- */
    .shell {
      max-width: 980px;
      margin: 0 auto;
      background: rgba(251, 249, 245, 0.95);
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .top {
      padding: 32px 32px 18px;
      text-align: center;
    }

    .real-logo {
      display: block;
      width: min(100%, 430px);
      height: auto;
      margin: 0 auto 6px;
      object-fit: contain;
    }

    .title-bar {
      background: #dcd6cb;
      color: #666057;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 14px;
      font-weight: 700;
      padding: 15px 18px;
      text-align: center;
    }

    .chooser-intro {
      text-align: center;
      color: var(--muted);
      font-size: 15px;
      padding: 26px 32px 2px;
    }

    .chooser {
      padding: 20px 32px 36px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .choice-card {
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 26px 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .choice-card:hover,
    .choice-card:focus-visible {
      transform: translateY(-3px);
      box-shadow: 0 16px 36px rgba(40, 30, 18, 0.10);
      border-color: rgba(101, 91, 78, 0.35);
      outline: none;
    }

    .choice-label {
      font-family: var(--font-display);
      font-size: 30px;
      font-weight: 600;
      color: var(--heading);
      line-height: 1.1;
    }

    .choice-sub {
      font-size: 13px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--muted);
    }

    .choice-cta {
      margin-top: 12px;
      align-self: flex-start;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fffdf9;
      border-radius: var(--radius-full);
      padding: 11px 20px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    /* ---------- Form screen ---------- */
    #formView {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      background: var(--bg);
      z-index: 50;
    }

    .form-topbar {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 16px;
      background: #dcd6cb;
      border-bottom: 1px solid var(--border);
    }

    .back-btn {
      border: 0;
      background: var(--surface);
      color: var(--text);
      border-radius: var(--radius-full);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(40, 30, 18, 0.08);
    }

    .form-topbar-title {
      font-size: 13px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      font-weight: 700;
      color: #666057;
    }

    #formFrame {
      flex: 1;
      width: 100%;
      border: 0;
      background: var(--bg);
    }

    @media (max-width: 760px) {
      body { padding: 0; }
      .shell { border-radius: 0; min-height: 100vh; }
      .top { padding: 26px 18px 14px; }
      .chooser-intro { padding: 22px 18px 2px; }
      .chooser { grid-template-columns: 1fr; padding: 18px 18px 30px; }
      .form-topbar-title { display: none; }
    }
  </style>
</head>
<body>
  <main id="selectorView" class="shell">
    <header class="top">
      <img src="./AH Full Logo - RGB Bronze.png" alt="Aphrodite Hills logo" class="real-logo" />
    </header>

    <div class="title-bar">Membership Registration 2026</div>

    <p class="chooser-intro">Please choose the membership you would like to register for.</p>

    <div class="chooser">
      <button type="button" class="choice-card" data-target="adult.html" data-label="Adult Membership">
        <span class="choice-label">Adult Membership</span>
        <span class="choice-sub">Ages 18 and over</span>
        <span class="choice-cta">Register &rarr;</span>
      </button>

      <button type="button" class="choice-card" data-target="junior.html" data-label="Junior Membership">
        <span class="choice-label">Junior Membership</span>
        <span class="choice-sub">Ages 17 and under</span>
        <span class="choice-cta">Register &rarr;</span>
      </button>
    </div>
  </main>

  <section id="formView" aria-hidden="true">
    <div class="form-topbar">
      <button type="button" id="backBtn" class="back-btn">&larr; Back to selection</button>
      <span id="formTitle" class="form-topbar-title"></span>
    </div>
    <iframe id="formFrame" title="Membership registration form" allow="camera"></iframe>
  </section>

  <script>
    const selectorView = document.getElementById('selectorView');
    const formView = document.getElementById('formView');
    const frame = document.getElementById('formFrame');
    const backBtn = document.getElementById('backBtn');
    const formTitle = document.getElementById('formTitle');

    function openForm(target, label) {
      frame.src = target;
      formTitle.textContent = label;
      selectorView.style.display = 'none';
      formView.style.display = 'flex';
      formView.setAttribute('aria-hidden', 'false');
      window.scrollTo(0, 0);
    }

    function backToSelection() {
      formView.style.display = 'none';
      formView.setAttribute('aria-hidden', 'true');
      frame.src = 'about:blank';
      selectorView.style.display = '';
      window.scrollTo(0, 0);
    }

    document.querySelectorAll('.choice-card').forEach(function (card) {
      card.addEventListener('click', function () {
        openForm(card.getAttribute('data-target'), card.getAttribute('data-label'));
      });
    });

    backBtn.addEventListener('click', backToSelection);
  </script>
</body>
</html>
